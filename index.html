<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盲打词汇锻炼场</title>
    <style>
        /* --- 动态毛玻璃主题样式 --- */
        :root {
            --bg-blur: blur(20px);
            --card-bg: rgba(255, 255, 255, 0.12);
            --card-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            
            /* 打字颜色反馈 */
            --color-untyped: rgba(255, 255, 255, 0.4);
            --color-correct: #34d399; /* 翠绿 */
            --color-wrong: #f87171; /* 错红 */
            --color-cursor: #60a5fa; /* 天蓝闪烁 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', Courier, monospace, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #0f172a;
            color: var(--text-color);
        }

        /* 静态流体背景生成 */
        .fluid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .circle-1 { width: max(35vw, 35vh); height: max(35vw, 35vh); background: #10b981; top: -10%; left: -10%; }
        .circle-2 { width: max(40vw, 40vh); height: max(40vw, 40vh); background: #8b5cf6; top: -15%; right: -10%; }
        .circle-3 { width: max(45vw, 45vh); height: max(45vw, 45vh); background: #0ea5e9; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .circle-4 { width: max(38vw, 38vh); height: max(38vw, 38vh); background: #ec4899; bottom: -10%; left: -10%; }
        .circle-5 { width: max(35vw, 35vh); height: max(35vw, 35vh); background: #f59e0b; bottom: -10%; right: -10%; }

        /* 容器布局 */
        .container {
            position: relative;
            z-index: 2;
            width: max(60vw, 320px);
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 状态统计面板 */
        .stats-panel {
            display: flex;
            gap: 20px;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: fit-content;
        }

        .stat-item span {
            font-weight: bold;
            color: #60a5fa;
        }

        /* 大正方形盲打区域 */
        .typing-box {
            position: relative;
            width: 100%;
            height: 400px;
            background: var(--card-bg);
            backdrop-filter: var(--bg-blur);
            -webkit-backdrop-filter: var(--bg-blur);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 30px;
            overflow-y: auto;
            font-size: 1.5rem;
            line-height: 2.2rem;
            letter-spacing: 1px;
            word-break: break-all;
            outline: none;
            user-select: none;
        }

        /* 隐藏的输入框用于捕获手机端和PC端的焦点 */
        #hiddenInput {
            position: absolute;
            opacity: 0;
            z-index: -1;
        }

        /* 字符状态样式 */
        .char {
            color: var(--color-untyped);
            border-bottom: 2px solid transparent;
            transition: all 0.1s ease;
        }

        .char.correct {
            color: var(--color-correct);
        }

        .char.wrong {
            color: var(--color-wrong);
            background: rgba(248, 113, 113, 0.15);
        }

        .char.current {
            color: #ffffff;
            animation: blink 0.8s infinite alternate;
            border-bottom: 2px solid var(--color-cursor);
        }

        @keyframes blink {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* 底部控制栏 */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: var(--bg-blur);
            -webkit-backdrop-filter: var(--bg-blur);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .hint {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* 滚动条美化 */
        .typing-box::-webkit-scrollbar {
            width: 6px;
        }
        .typing-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- 静态流体背景 -->
    <div class="fluid-bg">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        <div class="circle circle-4"></div>
        <div class="circle circle-5"></div>
    </div>

    <!-- 主体内容 -->
    <div class="container">
        <div class="stats-panel">
            <div class="stat-item">正确率: <span id="accuracy">100%</span></div>
            <div class="stat-item">速度: <span id="wpm">0</span> WPM</div>
            <div class="stat-item">进度: <span id="progress">0/100</span> 词</div>
        </div>

        <!-- 点击该区域可以自动Focus到隐藏的输入框 -->
        <div class="typing-box" id="typingBox" onclick="focusInput()">
            <!-- 动态生成的字母会落在这 -->
            <span class="hint">正在连接词典，加载100个随机词组...</span>
        </div>
        
        <input type="text" id="hiddenInput" autocomplete="off" autocapitalize="off" spellcheck="false">

        <div class="control-bar">
            <button class="btn" onclick="fetchAndReset()">重新生成 100 词</button>
            <div class="hint">💡 点击方块内部即可开始盲打练习 (支持 Backspace 退格修改)</div>
        </div>
    </div>

    <script>
        // 100个高频随机词基础库（网络异常时兜底）
        const fallbackWords = ["the","of","to","and","a","in","is","it","you","that","he","was","for","on","are","as","with","his","they","i","at","be","this","have","from","or","one","had","by","word","but","not","what","all","were","we","when","your","can","said","there","use","an","each","which","she","do","how","their","if","will","up","other","about","out","many","then","them","these","so","some","her","would","make","like","him","into","time","has","look","two","more","write","go","see","number","no","way","could","people","my","than","first","water","been","call","who","oil","its","now","find","long","down","day","did","get","come","made","may","part"];
        
        let targetText = ""; 
        let typedText = "";
        let totalWordsCount = 100;
        let startTime = null;
        let wrongCount = 0;
        let totalTypedCount = 0;

        const typingBox = document.getElementById('typingBox');
        const hiddenInput = document.getElementById('hiddenInput');

        // 从高容量开源API批量获取100个随机英文单词
        async function fetchAndReset() {
            typingBox.innerHTML = '<span class="hint">正在拉取海量词库中的 100 个随机词...</span>';
            try {
                const response = await fetch(`https://random-word-api.herokuapp.com/word?number=${totalWordsCount}`);
                if (!response.ok) throw new Error();
                const words = await response.json();
                targetText = words.join(" ");
            } catch (e) {
                // 异常时采用混淆洗牌算法生成100词
                let words = [];
                for(let i=0; i<totalWordsCount; i++){
                    words.push(fallbackWords[Math.floor(Math.random() * fallbackWords.length)]);
                }
                targetText = words.join(" ");
            }
            resetGame();
        }

        // 初始化/重置练习状态
        function resetGame() {
            typedText = "";
            startTime = null;
            wrongCount = 0;
            totalTypedCount = 0;
            hiddenInput.value = "";
            
            document.getElementById('accuracy').textContent = "100%";
            document.getElementById('wpm').textContent = "0";
            document.getElementById('progress').textContent = `0/${totalWordsCount}`;
            
            // 渲染DOM字符集
            typingBox.innerHTML = "";
            for (let i = 0; i < targetText.length; i++) {
                const span = document.createElement('span');
                span.className = 'char';
                span.textContent = targetText[i];
                typingBox.appendChild(span);
            }
            updateCursor();
            focusInput();
        }

        function focusInput() {
            hiddenInput.focus();
        }

        // 核心：处理用户输入
        hiddenInput.addEventListener('input', (e) => {
            if (!startTime) startTime = new Date();
            
            const currentInput = hiddenInput.value;
            totalTypedCount++;

            // 如果删除了字符
            if (currentInput.length < typedText.length) {
                typedText = currentInput;
            } else {
                // 新敲击的字符
                const nextChar = currentInput[currentInput.length - 1];
                const targetChar = targetText[typedText.length];
                
                if (nextChar !== targetChar) {
                    wrongCount++;
                }
                typedText = currentInput;
            }

            // 预防输入溢出
            if (typedText.length > targetText.length) {
                typedText = typedText.substring(0, targetText.length);
                hiddenInput.value = typedText;
            }

            renderDynamicStatus();
        });

        // 渲染高亮及位置更新
        function renderDynamicStatus() {
            const spans = typingBox.querySelectorAll('.char');
            
            spans.forEach((span, index) => {
                span.className = 'char'; // 清空历史状态
                
                if (index < typedText.length) {
                    if (typedText[index] === targetText[index]) {
                        span.classList.add('correct');
                    } else {
                        span.classList.add('wrong');
                    }
                }
            });

            updateCursor();
            calculateStats();
        }

        // 移动光标并自动滚动保持可见
        function updateCursor() {
            const spans = typingBox.querySelectorAll('.char');
            // 清理旧光标
            const oldCursor = typingBox.querySelector('.current');
            if (oldCursor) oldCursor.classList.remove('current');

            if (typedText.length < spans.length) {
                const currentSpan = spans[typedText.length];
                currentSpan.classList.add('current');
                
                // 视口自动跟随滚动
                if(currentSpan.offsetTop > (typingBox.scrollTop + typingBox.clientHeight - 60)) {
                    typingBox.scrollTop = currentSpan.offsetTop - 100;
                } else if (currentSpan.offsetTop < typingBox.scrollTop) {
                    typingBox.scrollTop = currentSpan.offsetTop - 20;
                }
            }
        }

        // 动态统计 WPM 与 正确率
        function calculateStats() {
            if (!startTime) return;
            
            // 计算打完了多少个完整单词
            const wordsFinished = typedText.split(" ").length - 1;
            document.getElementById('progress').textContent = `${Math.min(wordsFinished, totalWordsCount)}/${totalWordsCount}`;

            // 正确率 = (总敲击数 - 错误数) / 总敲击数
            const accuracy = totalTypedCount > 0 ? Math.max(0, Math.round(((totalTypedCount - wrongCount) / totalTypedCount) * 100)) : 100;
            document.getElementById('accuracy').textContent = accuracy + "%";

            // WPM (每分钟字数) 标准公式：(总正确输入字符数 / 5) / 分钟数
            const timeElapsed = (new Date() - startTime) / 1000 / 60; // 分钟
            if (timeElapsed > 0.01) {
                const correctChars = typingBox.querySelectorAll('.char.correct').length;
                const wpm = Math.round((correctChars / 5) / timeElapsed);
                document.getElementById('wpm').textContent = wpm;
            }
        }

        // 页面启动
        window.onload = fetchAndReset;
    </script>
</body>
</html>
